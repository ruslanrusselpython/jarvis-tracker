<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg: #0A0E17;
  --surface: #131A2B;
  --surface2: #1A2236;
  --border: #1E293B;
  --text: #E2E8F0;
  --text2: #94A3B8;
  --text3: #64748B;
  --models: #4A9EFF;
  --interface: #4ADE80;
  --infra: #A78BFA;
  --society: #FB923C;
  --goal: #FBBF24;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
  min-height: 100dvh;
  line-height: 1.5;
}

/* ── Header ── */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  gap: 20px;
  position: sticky; top:0; z-index:10;
  flex-wrap: wrap;
}
.logo { font-size:20px; font-weight:700; letter-spacing:-0.5px; white-space:nowrap; }
.logo span { color:var(--goal); }

.progress-wrap { flex:1; max-width:340px; min-width:140px; }
.progress-label { display:flex; justify-content:space-between; font-size:12px; color:var(--text2); margin-bottom:4px; }
.progress-bar { height:6px; background:var(--surface2); border-radius:3px; overflow:hidden; }
.progress-fill { height:100%; background:linear-gradient(90deg, var(--models), var(--interface), var(--goal)); border-radius:3px; transition:width .6s; }

.eta { font-size:13px; color:var(--text2); white-space:nowrap; }
.eta strong { color:var(--goal); }

.filters { display:flex; gap:6px; margin-left:auto; flex-wrap:wrap; }
.filters button {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 6px 14px;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  transition: all .2s;
  white-space: nowrap;
}
.filters button:hover { background:#243049; color:var(--text); }
.filters button.active { border-color:var(--models); color:var(--models); background:#1E3A5F; }

/* ── Main ── */
main { padding: 20px 24px 40px; max-width:1200px; margin:0 auto; }

/* Layer section */
.layer-section { margin-bottom: 32px; }

.layer-header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.layer-num {
  width: 40px; height: 40px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 18px;
  flex-shrink: 0;
}
.layer-num.models { background:var(--models); color:#000; }
.layer-num.interface { background:var(--interface); color:#000; }
.layer-num.infra { background:var(--infra); color:#000; }
.layer-num.society { background:var(--society); color:#000; }
.layer-num.goal { background:var(--goal); color:#000; }

.layer-title { font-size:20px; font-weight:700; }
.layer-meta { font-size:12px; color:var(--text3); display:flex; gap:16px; align-items:center; }

/* Layer news highlight */
.layer-news {
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--models);
  border-radius: 8px;
  padding: 12px 16px;
  margin-bottom: 14px;
  font-size: 13px;
  cursor: pointer;
  transition: border-color .2s;
}
.layer-news:hover { border-color: #334155; }
.layer-news-label { font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:1px; margin-bottom:4px; }
.layer-news-title { color:var(--text); line-height:1.4; }
.layer-news-source { font-size:10px; color:var(--text3); margin-top:4px; }

/* Sub-node cards */
.subnodes {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 10px;
}

.node-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  cursor: pointer;
  transition: border-color .2s, transform .15s;
  -webkit-tap-highlight-color: transparent;
}
.node-card:hover { border-color: #334155; transform: translateY(-1px); }
.node-card:active { transform: translateY(0); }

.node-card-top { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.node-card-dot {
  width:12px; height:12px; border-radius:50%; flex-shrink:0;
}
.node-card-name { font-size:14px; font-weight:600; }

.node-card-bar-wrap { display:flex; align-items:center; gap:8px; }
.node-card-bar {
  flex:1; height:4px; background:var(--surface2); border-radius:2px; overflow:hidden;
}
.node-card-bar-fill { height:100%; border-radius:2px; transition:width .4s; }
.node-card-pct { font-size:11px; color:var(--text3); white-space:nowrap; min-width:32px; text-align:right; }

.node-card-date { font-size:11px; color:var(--text3); margin-top:8px; }
.node-card-news-count { font-size:10px; color:var(--text3); margin-top:2px; }

/* ── Side Panel ── */
#panel-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:20;
  opacity:0; pointer-events:none; transition:opacity .3s;
}
#panel-overlay.open { opacity:1; pointer-events:auto; }

#panel {
  position:fixed; top:0; right:0; width:440px; max-width:100vw; height:100dvh;
  background:var(--surface); border-left:1px solid var(--border);
  z-index:21;
  transform: translateX(100%);
  transition: transform .35s cubic-bezier(0.22,0.61,0.36,1);
  display:flex; flex-direction:column;
  overflow-y:auto;
}
#panel.open { transform:translateX(0); }

.panel-header {
  padding:20px 24px 12px;
  border-bottom:1px solid var(--border);
  display:flex; align-items:flex-start; justify-content:space-between;
  position:sticky; top:0; background:var(--surface); z-index:1;
}
.panel-header h2 { font-size:18px; line-height:1.3; }
.panel-close {
  background:none; border:none; color:var(--text2); font-size:22px;
  cursor:pointer; line-height:1; padding:2px 6px; border-radius:4px;
}
.panel-close:hover { background:var(--surface2); color:var(--text); }

.panel-progress { padding:12px 24px; border-bottom:1px solid var(--border); }
.panel-progress .mini-bar { height:4px; background:var(--surface2); border-radius:2px; margin-top:4px; overflow:hidden; }
.panel-progress .mini-fill { height:100%; border-radius:2px; transition:width .4s; }

.panel-desc { padding:14px 24px; font-size:13px; color:var(--text2); line-height:1.6; border-bottom:1px solid var(--border); }

.panel-news { padding:14px 24px 30px; flex:1; }
.panel-news h3 { font-size:13px; color:var(--text2); margin-bottom:12px; text-transform:uppercase; letter-spacing:1px; }

.news-item {
  padding:12px 14px;
  background:var(--surface2);
  border-radius:8px;
  margin-bottom:8px;
  border:1px solid transparent;
  transition:border-color .2s;
  cursor:pointer;
}
.news-item:hover { border-color:var(--border); }
.news-item .news-date { font-size:10px; color:var(--text3); margin-bottom:4px; }
.news-item .news-title { font-size:13px; line-height:1.4; color:var(--text); word-break:break-word; }
.news-item .news-source { font-size:10px; color:var(--text3); margin-top:4px; word-break:break-all; }
.news-empty { font-size:13px; color:var(--text3); text-align:center; padding:30px 0; }

/* ── Footer ── */
footer {
  background:var(--surface);
  border-top:1px solid var(--border);
  padding:12px 24px;
  font-size:11px;
  color:var(--text3);
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:6px;
}

::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

/* ── Mobile ── */
@media (max-width:768px) {
  header { padding:10px 14px; gap:10px; }
  .logo { font-size:16px; }
  .progress-wrap { max-width:160px; }
  .filters { gap:4px; }
  .filters button { padding:5px 10px; font-size:11px; }
  main { padding:12px 10px 30px; }
  .layer-title { font-size:17px; }
  .subnodes { grid-template-columns: 1fr; }
  #panel { width:100vw; }
  footer { font-size:10px; padding:10px 14px; }
}
</style>

</div>

<script>
(function() {
  'use strict';

  var TRACK_HEX = { models:'#4A9EFF', interface:'#4ADE80', infrastructure:'#A78BFA', society:'#FB923C', goal:'#FBBF24' };
  var TRACK_NAMES = { models:'Модели и AGI', interface:'Интерфейс', infrastructure:'Инфраструктура', society:'Общество', goal:'Цель' };
  var LAYER_TITLES = ['Фундамент', 'Базовые технологии', 'Продвинутые', 'Экосистема', 'Принятие', 'JARVIS'];
  var LAYER_ICONS = ['01','02','03','04','05','★'];

  var currentData = null;
  var activeTrack = '';

  // ── Helpers ──
  function progressToDate(progress, targetYear) {
    if (progress >= 95) return targetYear + '';
    var startYear = 2026;
    var yearsToGo = (targetYear - startYear) * (1 - progress / 100);
    var year = startYear + yearsToGo;
    var quarter = Math.floor((year - Math.floor(year)) * 4) + 1;
    var y = Math.floor(year);
    if (yearsToGo < 0.5) return 'Q' + quarter + ' ' + y;
    return y + '';
  }

  function avgProgress(nodes) {
    if (!nodes.length) return 0;
    var sum = 0;
    for (var i = 0; i < nodes.length; i++) sum += nodes[i].progress;
    return Math.round(sum / nodes.length);
  }

  function latestNews(nodes) {
    var all = [];
    for (var i = 0; i < nodes.length; i++) {
      if (nodes[i].news) all = all.concat(nodes[i].news);
    }
    all.sort(function(a,b) { return b.date.localeCompare(a.date); });
    return all[0] || null;
  }

  // ── Init ──
  async function init() {
    try {
      var resp = await fetch('data.json');
      if (!resp.ok) throw new Error('fetch failed');
      currentData = await resp.json();
    } catch(e) {
      var el = document.getElementById('embedded-data');
      if (el && el.textContent.trim()) {
        try { currentData = JSON.parse(el.textContent); } catch(e2) {
          document.getElementById('main-content').innerHTML = '<p style="color:var(--text2);text-align:center;padding:40px">Ошибка данных</p>';
          return;
        }
      } else {
        document.getElementById('main-content').innerHTML = '<p style="color:var(--text2);text-align:center;padding:40px">Не удалось загрузить данные. Запустите:<br><code>python -m http.server 8080</code></p>';
        return;
      }
    }

    if (!currentData || !currentData.nodes) return;

    // Overall progress
    var regular = currentData.nodes.filter(function(n) { return n.id !== 'jarvis'; });
    var overall = avgProgress(regular);
    document.getElementById('overall-pct').textContent = overall + '%';
    document.getElementById('progress-fill').style.width = overall + '%';

    // ETA
    var tY = currentData.meta.targetYear || 2032;
    var pr = overall / 100;
    var etaYear = Math.max(2027, Math.round(2026 + (tY - 2026) * (1 - pr)));
    document.getElementById('eta-text').textContent = '~' + etaYear;

    // Footer
    document.getElementById('footer-updated').textContent = 'Обновлено: ' + (currentData.meta.lastUpdated || '—');

    buildFilters();
    render();
  }

  // ── Filters ──
  function buildFilters() {
    var container = document.getElementById('filters');
    // Keep "All" button, add track buttons
    Object.keys(TRACK_NAMES).forEach(function(t) {
      var btn = document.createElement('button');
      btn.textContent = TRACK_NAMES[t];
      btn.dataset.track = t;
      btn.addEventListener('click', function() {
        activeTrack = (activeTrack === t) ? '' : t;
        document.querySelectorAll('#filters button').forEach(function(b) {
          b.classList.toggle('active', b.dataset.track === activeTrack);
          if (b.dataset.track === '') b.classList.toggle('active', !activeTrack);
        });
        render();
      });
      container.appendChild(btn);
    });
  }

  // ── Render ──
  function render() {
    var main = document.getElementById('main-content');
    main.innerHTML = '';

    // Group nodes by layer
    var byLayer = {};
    for (var i = 0; i < currentData.nodes.length; i++) {
      var n = currentData.nodes[i];
      if (!byLayer[n.layer]) byLayer[n.layer] = [];
      byLayer[n.layer].push(n);
    }

    var layers = Object.keys(byLayer).sort(function(a,b) { return a - b; });
    var targetYear = currentData.meta.targetYear || 2032;

    for (var li = 0; li < layers.length; li++) {
      var layer = parseInt(layers[li]);
      var nodes = byLayer[layer];

      // Filter by track
      var visibleNodes = nodes;
      if (activeTrack) {
        visibleNodes = nodes.filter(function(n) {
          return n.track === activeTrack || n.track === 'goal';
        });
        if (visibleNodes.length === 0) continue;
      }

      var layerAvg = avgProgress(visibleNodes.filter(function(n) { return n.id !== 'jarvis'; }));
      var layerDate = progressToDate(layerAvg, targetYear);
      var topNews = latestNews(visibleNodes);

      // Determine layer accent color (use first node's track or dominant)
      var accentTrack = nodes[0].track;
      var accentHex = TRACK_HEX[accentTrack] || '#4A9EFF';

      // Layer section
      var section = document.createElement('div');
      section.className = 'layer-section';

      // Header
      var iconClass = (layer === 5) ? 'goal' : (accentTrack);
      section.innerHTML =
        '<div class="layer-header">' +
          '<div class="layer-num ' + iconClass + '">' + (LAYER_ICONS[layer] || layer+1) + '</div>' +
          '<div class="layer-title">' + (LAYER_TITLES[layer] || 'Слой ' + layer) + '</div>' +
          '<div class="layer-meta">' +
            '<span>Прогресс слоя: <b>' + layerAvg + '%</b></span>' +
            '<span>Ожидаемый срок: <b>' + layerDate + '</b></span>' +
            '<span>Подэтапов: <b>' + visibleNodes.length + '</b></span>' +
          '</div>' +
        '</div>';

      // Highlight news
      if (topNews) {
        var newsDiv = document.createElement('div');
        newsDiv.className = 'layer-news';
        newsDiv.style.borderLeftColor = accentHex;
        newsDiv.innerHTML =
          '<div class="layer-news-label">Свежая новость · ' + topNews.date + '</div>' +
          '<div class="layer-news-title">' + topNews.title + '</div>' +
          '<div class="layer-news-source">' + topNews.source + ' · ' + topNews.url + '</div>';
        newsDiv.addEventListener('click', function() { window.open(topNews.url, '_blank'); });
        section.appendChild(newsDiv);
      }

      // Sub-node cards
      var subGrid = document.createElement('div');
      subGrid.className = 'subnodes';

      for (var ni = 0; ni < visibleNodes.length; ni++) {
        var nd = visibleNodes[ni];
        var hex = (nd.id === 'jarvis') ? TRACK_HEX.goal : (TRACK_HEX[nd.track] || '#4A9EFF');
        var pct = nd.id === 'jarvis' ? '—' : nd.progress + '%';
        var pctW = nd.id === 'jarvis' ? 0 : nd.progress;
        var ndDate = nd.id === 'jarvis' ? targetYear : progressToDate(nd.progress, targetYear);
        var newsN = nd.news ? nd.news.length : 0;

        var card = document.createElement('div');
        card.className = 'node-card';
        card.innerHTML =
          '<div class="node-card-top">' +
            '<div class="node-card-dot" style="background:' + hex + '"></div>' +
            '<div class="node-card-name">' + nd.shortName + '</div>' +
          '</div>' +
          '<div class="node-card-bar-wrap">' +
            '<div class="node-card-bar"><div class="node-card-bar-fill" style="width:' + pctW + '%;background:' + hex + '"></div></div>' +
            '<div class="node-card-pct">' + pct + '</div>' +
          '</div>' +
          '<div class="node-card-date">Ожидаемый срок: ' + ndDate + '</div>' +
          (newsN > 0 ? '<div class="node-card-news-count">Новостей: ' + newsN + '</div>' : '');

        card.addEventListener('click', function(d) { return function() { openPanel(d); }; }(nd));
        subGrid.appendChild(card);
      }

      section.appendChild(subGrid);
      main.appendChild(section);
    }
  }

  // ── Panel ──
  function openPanel(d) {
    document.getElementById('panel-overlay').classList.add('open');
    document.getElementById('panel').classList.add('open');
    document.getElementById('panel-title').textContent = d.name;
    document.getElementById('panel-pct').textContent = (d.id === 'jarvis') ? 'Цель' : d.progress + '%';

    var hex = TRACK_HEX[d.track] || TRACK_HEX.goal;
    var fill = document.getElementById('panel-mini-fill');
    fill.style.width = (d.id === 'jarvis') ? '0%' : d.progress + '%';
    fill.style.background = hex;

    document.getElementById('panel-desc').textContent = d.description;

    var newsList = document.getElementById('panel-news-list');
    if (d.news && d.news.length > 0) {
      newsList.innerHTML = d.news.map(function(n) {
        return '<div class="news-item" onclick="window.open(\'' + n.url + '\',\'_blank\')" title="' + n.url + '">' +
          '<div class="news-date">' + n.date + ' · ' + n.source + '</div>' +
          '<div class="news-title">' + n.title + '</div>' +
          '<div class="news-source">' + n.url + '</div>' +
        '</div>';
      }).join('');
    } else {
      newsList.innerHTML = '<div class="news-empty">Новостей пока нет — этот этап ещё впереди</div>';
    }

    document.getElementById('panel').scrollTop = 0;
  }

  function closePanel() {
    document.getElementById('panel-overlay').classList.remove('open');
    document.getElementById('panel').classList.remove('open');
  }

  window.openPanel = openPanel;
  window.closePanel = closePanel;

  document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closePanel(); });

  // ── Start ──
  init();
})();
</script>
</body>
</html>
