<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roadmap to Jarvis — Прогресс создания ИИ-помощника</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg: #0A0E17;
  --surface: #131A2B;
  --surface2: #1A2236;
  --border: #1E293B;
  --text: #E2E8F0;
  --text2: #94A3B8;
  --text3: #64748B;

  --track-models: #4A9EFF;
  --track-interface: #4ADE80;
  --track-infra: #A78BFA;
  --track-society: #FB923C;
  --track-goal: #FBBF24;

  --glow-models: rgba(74,158,255,0.3);
  --glow-interface: rgba(74,222,128,0.3);
  --glow-infra: rgba(167,139,250,0.3);
  --glow-society: rgba(251,146,60,0.3);
  --glow-goal: rgba(251,191,36,0.4);
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
  overflow: hidden;
  height: 100vh;
  user-select: none;
}

#app { display:flex; flex-direction:column; height:100vh; }

/* ── Header ── */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  gap: 24px;
  z-index: 10;
}

.logo { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; white-space: nowrap; }
.logo span { color: var(--track-goal); }

.progress-wrap { flex:1; max-width: 400px; }
.progress-label { display:flex; justify-content:space-between; font-size:12px; color:var(--text2); margin-bottom:4px; }
.progress-bar { height:6px; background:var(--surface2); border-radius:3px; overflow:hidden; }
.progress-fill { height:100%; background:linear-gradient(90deg, var(--track-models), var(--track-interface), var(--track-goal)); border-radius:3px; transition:width .6s ease; }

.eta { font-size:13px; color:var(--text2); white-space:nowrap; }
.eta strong { color:var(--track-goal); }

.header-actions { display:flex; gap:8px; margin-left:auto; }
.header-actions button {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 14px;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  transition: all .2s;
}
.header-actions button:hover { background: #243049; border-color: #334155; }
.header-actions button.active { background: #1E3A5F; border-color: var(--track-models); color: var(--track-models); }

/* ── Main graph ── */
main { flex:1; position:relative; overflow:hidden; }

#graph { width:100%; height:100%; }

.node-group { cursor:pointer; }
.node-group .node-bg { transition: r .2s, filter .2s; }
.node-group:hover .node-bg { filter: brightness(1.3); }
.node-group.highlighted .node-bg { filter: brightness(1.4) drop-shadow(0 0 6px var(--node-color)); }

.node-label { font-size:11px; fill:var(--text); pointer-events:none; font-weight:500; text-anchor:middle; }
.node-pct { font-size:9px; fill:var(--text2); pointer-events:none; text-anchor:middle; }

.edge-line { stroke:#2A3A5C; stroke-width:1.5; transition: stroke .2s; }
.edge-line.highlighted { stroke:#5A7ABF; stroke-width:2.5; }
.edge-line.dimmed { stroke:#1A2A4A; stroke-width:1; opacity:0.5; }

/* ── Legend ── */
#legend {
  position: absolute;
  top: 16px;
  left: 16px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  z-index: 5;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  color: var(--text2);
  padding: 5px 10px;
  background: rgba(19,26,43,0.85);
  border-radius: 6px;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all .2s;
}
.legend-item:hover { background: rgba(26,34,54,0.9); }
.legend-item .dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.legend-item.filtered { opacity:0.4; }

/* ── Side Panel ── */
#panel-overlay {
  position: fixed; inset:0; background:rgba(0,0,0,0.5); z-index:20;
  opacity:0; pointer-events:none; transition:opacity .3s;
}
#panel-overlay.open { opacity:1; pointer-events:auto; }

#panel {
  position: fixed; top:0; right:0; width:420px; max-width:100vw; height:100vh;
  background: var(--surface); border-left: 1px solid var(--border);
  z-index:21;
  transform: translateX(100%);
  transition: transform .35s cubic-bezier(0.22, 0.61, 0.36, 1);
  display: flex; flex-direction: column;
  overflow-y: auto;
}
#panel.open { transform: translateX(0); }

.panel-header {
  padding: 20px 24px 12px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-start; justify-content: space-between;
  position: sticky; top:0; background: var(--surface); z-index:1;
}
.panel-header h2 { font-size:18px; line-height:1.3; }
.panel-header .track-badge {
  font-size:10px; padding:3px 10px; border-radius:10px;
  text-transform: uppercase; letter-spacing:0.5px; font-weight:600;
  white-space:nowrap; margin-top:4px;
}
.panel-close {
  background: none; border: none; color: var(--text2); font-size: 22px;
  cursor: pointer; line-height:1; padding:2px 6px; border-radius:4px;
}
.panel-close:hover { background: var(--surface2); color: var(--text); }

.panel-progress { padding: 12px 24px; border-bottom: 1px solid var(--border); }
.panel-progress .mini-bar { height:4px; background:var(--surface2); border-radius:2px; margin-top:4px; overflow:hidden; }
.panel-progress .mini-fill { height:100%; border-radius:2px; transition:width .4s; }

.panel-desc { padding: 14px 24px; font-size:13px; color:var(--text2); line-height:1.6; border-bottom: 1px solid var(--border); }

.panel-news { padding: 14px 24px 30px; flex:1; }
.panel-news h3 { font-size:13px; color:var(--text2); margin-bottom:12px; text-transform:uppercase; letter-spacing:1px; }

.news-item {
  padding: 12px 14px;
  background: var(--surface2);
  border-radius: 8px;
  margin-bottom: 8px;
  border: 1px solid transparent;
  transition: border-color .2s;
  cursor: pointer;
}
.news-item:hover { border-color: var(--border); }
.news-item .news-date { font-size:10px; color:var(--text3); margin-bottom:4px; }
.news-item .news-title { font-size:13px; line-height:1.4; color:var(--text); }
.news-item .news-source { font-size:10px; color:var(--text3); margin-top:4px; }
.news-empty { font-size:13px; color:var(--text3); text-align:center; padding:30px 0; }

/* ── Tooltip ── */
#tooltip {
  position: fixed;
  padding: 10px 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 12px;
  color: var(--text);
  pointer-events: none;
  opacity: 0;
  transition: opacity .15s;
  z-index: 15;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  max-width: 260px;
}
#tooltip .tt-name { font-weight:600; font-size:13px; margin-bottom:2px; }
#tooltip .tt-track { font-size:10px; color:var(--text3); }
#tooltip .tt-pct { font-size:11px; color:var(--track-goal); margin-top:4px; }

/* ── Footer ── */
footer {
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 8px 24px;
  font-size: 11px;
  color: var(--text3);
  display: flex;
  justify-content: space-between;
  z-index: 10;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

@media (max-width:768px) {
  header { padding:10px 14px; gap:12px; }
  .logo { font-size:16px; }
  .progress-wrap { max-width:160px; }
  #panel { width:100vw; }
  #legend { top:auto; bottom:60px; left:8px; flex-direction:row; flex-wrap:wrap; gap:4px; }
  .legend-item { font-size:10px; padding:4px 8px; }
}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">ROADMAP TO <span>JARVIS</span></div>
    <div class="progress-wrap">
      <div class="progress-label"><span>Общий прогресс</span><span id="overall-pct">42%</span></div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:42%"></div></div>
    </div>
    <div class="eta">До Jarvis: <strong id="eta-text">~2030</strong></div>
    <div class="header-actions">
      <button id="btn-reset" title="Сбросить вид">Сброс</button>
      <button id="btn-all" class="active" title="Все треки">Все</button>
    </div>
  </header>

  <main>
    <svg id="graph"></svg>
    <div id="legend"></div>
  </main>

  <footer>
    <span id="footer-updated"></span>
    <span>Данные: открытые источники · Новости обновляются еженедельно</span>
  </footer>
</div>

<div id="tooltip"></div>

<div id="panel-overlay" onclick="closePanel()"></div>
<div id="panel">
  <div class="panel-header">
    <div><h2 id="panel-title"></h2></div>
    <button class="panel-close" onclick="closePanel()">&times;</button>
  </div>
  <div class="panel-progress">
    <div class="progress-label"><span>Готовность этапа</span><span id="panel-pct"></span></div>
    <div class="mini-bar"><div class="mini-fill" id="panel-mini-fill"></div></div>
  </div>
  <div class="panel-desc" id="panel-desc"></div>
  <div class="panel-news">
    <h3>Новости</h3>
    <div id="panel-news-list"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
//  ROADMAP TO JARVIS — D3.js Force Graph
// ═══════════════════════════════════════════

const TRACK_COLORS = {
  models: 'var(--track-models)',
  interface: 'var(--track-interface)',
  infrastructure: 'var(--track-infra)',
  society: 'var(--track-society)',
  goal: 'var(--track-goal)'
};

const TRACK_GLOW = {
  models: 'var(--glow-models)',
  interface: 'var(--glow-interface)',
  infrastructure: 'var(--glow-infra)',
  society: 'var(--glow-society)',
  goal: 'var(--glow-goal)'
};

const TRACK_NAMES = {
  models: 'Модели и AGI',
  interface: 'Интерфейс',
  infrastructure: 'Инфраструктура',
  society: 'Общество',
  goal: 'Цель'
};

const TRACK_HEX = {
  models: '#4A9EFF',
  interface: '#4ADE80',
  infrastructure: '#A78BFA',
  society: '#FB923C',
  goal: '#FBBF24'
};

let currentData = null;
let activeTrack = null;
let simulation = null;
let svg = null;
let gEdges = null;
let gNodes = null;
let gLabels = null;

// Встроенные данные для offline/локального открытия (file://)
const EMBEDDED_DATA = null; // будет заполнено из разметки

async function init() {
  try {
    const resp = await fetch('data.json');
    if (!resp.ok) throw new Error('fetch failed');
    currentData = await resp.json();
  } catch {
    // Fallback: ищем встроенные данные в <script id="embedded-data">
    const el = document.getElementById('embedded-data');
    if (el) {
      currentData = JSON.parse(el.textContent);
      console.log('[Jarvis Tracker] Загружены встроенные данные (offline-режим)');
    } else {
      document.body.innerHTML = '<div style="color:white;padding:40px;text-align:center"><h2>Не удалось загрузить данные</h2><p>Запустите через HTTP-сервер:<br><code>python -m http.server 8080</code><br>и откройте <code>http://localhost:8080</code></p></div>';
      return;
    }
  }

  // Calculate overall progress
  const regularNodes = currentData.nodes.filter(n => n.id !== 'jarvis');
  const overallProgress = Math.round(
    regularNodes.reduce((sum, n) => sum + n.progress, 0) / regularNodes.length
  );

  document.getElementById('overall-pct').textContent = overallProgress + '%';
  document.getElementById('progress-fill').style.width = overallProgress + '%';

  // ETA calculation
  const targetYear = currentData.meta.targetYear;
  const progressRatio = overallProgress / 100;
  const yearsRemaining = Math.max(1, Math.round((targetYear - 2026) * (1 - progressRatio)));
  const etaYear = 2026 + yearsRemaining;
  document.getElementById('eta-text').textContent = '~' + etaYear;

  // Footer
  document.getElementById('footer-updated').textContent =
    'Обновлено: ' + currentData.meta.lastUpdated;

  buildLegend();
  buildGraph();
  buildTrackButtons();
}

function buildTrackButtons() {
  const container = document.querySelector('.header-actions');
  Object.entries(TRACK_NAMES).forEach(([track, name]) => {
    const btn = document.createElement('button');
    btn.textContent = name;
    btn.dataset.track = track;
    btn.addEventListener('click', () => {
      if (activeTrack === track) {
        activeTrack = null;
        btn.classList.remove('active');
        document.getElementById('btn-all').classList.add('active');
      } else {
        activeTrack = track;
        document.querySelectorAll('.header-actions button[data-track]').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-all').classList.remove('active');
        btn.classList.add('active');
      }
      updateFilter();
    });
    container.appendChild(btn);
  });

  document.getElementById('btn-all').addEventListener('click', () => {
    activeTrack = null;
    document.getElementById('btn-all').classList.add('active');
    document.querySelectorAll('.header-actions button[data-track]').forEach(b => b.classList.remove('active'));
    updateFilter();
  });
}

function buildLegend() {
  const legend = document.getElementById('legend');
  legend.innerHTML = '';

  Object.entries(TRACK_NAMES).forEach(([track, name]) => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.dataset.track = track;
    item.innerHTML = `<span class="dot" style="background:${TRACK_HEX[track]}"></span>${name}`;
    item.addEventListener('click', () => {
      if (activeTrack === track) {
        activeTrack = null;
        updateFilter();
      } else {
        activeTrack = track;
        updateFilter();
      }
      document.querySelectorAll('.legend-item').forEach(el =>
        el.classList.toggle('filtered', activeTrack && el.dataset.track !== activeTrack)
      );
      document.querySelectorAll('.header-actions button[data-track]').forEach(b =>
        b.classList.toggle('active', b.dataset.track === activeTrack)
      );
      document.getElementById('btn-all').classList.toggle('active', !activeTrack);
    });
    legend.appendChild(item);
  });
}

function updateFilter() {
  document.querySelectorAll('.legend-item').forEach(el =>
    el.classList.toggle('filtered', activeTrack && el.dataset.track !== activeTrack)
  );

  if (!gNodes) return;

  gNodes.selectAll('.node-group').each(function(d) {
    const visible = !activeTrack || d.track === activeTrack || d.track === 'goal';
    d3.select(this).style('opacity', visible ? 1 : 0.15);
  });

  gEdges.selectAll('.edge-line').each(function(d) {
    const fromNode = currentData.nodes.find(n => n.id === d.from);
    const toNode = currentData.nodes.find(n => n.id === d.to);
    const fromVisible = !activeTrack || fromNode.track === activeTrack || fromNode.track === 'goal';
    const toVisible = !activeTrack || toNode.track === activeTrack || toNode.track === 'goal';
    d3.select(this).style('opacity', (fromVisible && toVisible) ? 1 : 0.1);
  });

  gLabels.selectAll('.node-label').each(function(d) {
    const visible = !activeTrack || d.track === activeTrack || d.track === 'goal';
    d3.select(this).style('opacity', visible ? 1 : 0);
  });
}

function buildGraph() {
  svg = d3.select('#graph');
  const width = svg.node().clientWidth;
  const height = svg.node().clientHeight;

  svg.selectAll('*').remove();

  // SVG defs for arrow markers
  const defs = svg.append('defs');
  defs.append('marker')
    .attr('id', 'arrowhead')
    .attr('viewBox', '0 -4 8 8')
    .attr('refX', 20)
    .attr('refY', 0)
    .attr('markerWidth', 6)
    .attr('markerHeight', 6)
    .attr('orient', 'auto')
    .append('path')
    .attr('d', 'M0,-4L8,0L0,4')
    .attr('fill', '#2A3A5C');

  gEdges = svg.append('g').attr('class', 'edges');
  gNodes = svg.append('g').attr('class', 'nodes');
  gLabels = svg.append('g').attr('class', 'labels');

  // Prepare data: assign layer positions
  const layers = [0,1,2,3,4,5];
  const layerWidth = (width - 160) / 5; // spread layers
  const startX = 100;

  const nodes = currentData.nodes.map(n => ({
    ...n,
    x: startX + n.layer * layerWidth,
    y: height / 2
  }));

  const edges = currentData.edges.map(e => ({
    ...e,
    source: nodes.find(n => n.id === e.from),
    target: nodes.find(n => n.id === e.to)
  }));

  // Edge lines
  gEdges.selectAll('line')
    .data(edges)
    .join('line')
    .attr('class', 'edge-line')
    .attr('marker-end', 'url(#arrowhead)')
    .attr('x1', d => d.source.x)
    .attr('y1', d => d.source.y)
    .attr('x2', d => d.target.x)
    .attr('y2', d => d.target.y);

  // Node groups
  const nodeGroups = gNodes.selectAll('g')
    .data(nodes)
    .join('g')
    .attr('class', 'node-group')
    .attr('id', d => 'node-' + d.id)
    .on('click', (event, d) => openPanel(d))
    .on('mouseenter', (event, d) => showTooltip(event, d))
    .on('mouseleave', hideTooltip);

  // Node circles
  nodeGroups.append('circle')
    .attr('class', 'node-bg')
    .attr('r', d => d.id === 'jarvis' ? 36 : 18 + d.progress * 0.18)
    .attr('cx', d => d.x)
    .attr('cy', d => d.y)
    .attr('fill', d => d.id === 'jarvis'
      ? 'var(--surface2)'
      : TRACK_HEX[d.track] + '20')
    .attr('stroke', d => d.id === 'jarvis'
      ? TRACK_HEX.goal
      : TRACK_HEX[d.track])
    .attr('stroke-width', d => d.id === 'jarvis' ? 3 : 2)
    .attr('stroke-dasharray', d => d.id === 'jarvis' ? '6,3' : 'none')
    .style('--node-color', d => TRACK_HEX[d.track]);

  // Progress arcs
  nodeGroups.filter(d => d.id !== 'jarvis')
    .append('path')
    .attr('fill', 'none')
    .attr('stroke', d => TRACK_HEX[d.track])
    .attr('stroke-width', 3)
    .attr('stroke-linecap', 'round')
    .attr('d', d => {
      const r = 18 + d.progress * 0.18 + 5;
      const pct = d.progress / 100;
      const angle = -Math.PI / 2 + pct * 2 * Math.PI;
      const x = d.x;
      const y = d.y;
      const x1 = x + r * Math.cos(-Math.PI / 2);
      const y1 = y + r * Math.sin(-Math.PI / 2);
      const x2 = x + r * Math.cos(angle);
      const y2 = y + r * Math.sin(angle);
      const largeArc = pct > 0.5 ? 1 : 0;
      return `M ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2}`;
    });

  // Jarvis special styling
  nodeGroups.filter(d => d.id === 'jarvis')
    .append('text')
    .attr('text-anchor', 'middle')
    .attr('dy', '0.35em')
    .attr('x', d => d.x)
    .attr('y', d => d.y)
    .attr('fill', TRACK_HEX.goal)
    .attr('font-size', '11px')
    .attr('font-weight', '700')
    .text('★');

  // Labels
  gLabels.selectAll('text')
    .data(nodes)
    .join('text')
    .attr('class', 'node-label')
    .attr('x', d => d.x)
    .attr('y', d => d.y + (d.id === 'jarvis' ? 52 : 18 + d.progress * 0.18 + 18))
    .text(d => d.shortName);

  // Add percentage text
  gLabels.selectAll('.pct-label')
    .data(nodes)
    .join('text')
    .attr('class', 'node-pct')
    .attr('x', d => d.x)
    .attr('y', d => d.y + (d.id === 'jarvis' ? 67 : 18 + d.progress * 0.18 + 31))
    .text(d => d.id === 'jarvis' ? 'ЦЕЛЬ' : d.progress + '%');

  // Layer labels at top
  const layerLabels = ['ФУНДАМЕНТ', 'БАЗОВЫЕ ТЕХНОЛОГИИ', 'ПРОДВИНУТЫЕ', 'ЭКОСИСТЕМА', 'ПРИНЯТИЕ', 'JARVIS'];
  svg.selectAll('.layer-label')
    .data(layerLabels)
    .join('text')
    .attr('x', (d, i) => startX + i * layerWidth)
    .attr('y', 30)
    .attr('text-anchor', 'middle')
    .attr('fill', 'var(--text3)')
    .attr('font-size', '10px')
    .attr('letter-spacing', '1px')
    .text(d => d);

  // Layer divider lines
  svg.selectAll('.layer-line')
    .data(layers)
    .join('line')
    .attr('x1', d => startX + d * layerWidth)
    .attr('y1', 45)
    .attr('x2', d => startX + d * layerWidth)
    .attr('y2', height - 40)
    .attr('stroke', 'var(--border)')
    .attr('stroke-width', 1)
    .attr('stroke-dasharray', '2,4');

  // Force simulation (only Y axis)
  simulation = d3.forceSimulation(nodes)
    .force('y', d3.forceY(height / 2).strength(0.08))
    .force('collision', d3.forceCollide().radius(d => (d.id === 'jarvis' ? 36 : 18 + d.progress * 0.18) + 20))
    .force('link', d3.forceLink(edges).id(d => d.id).distance(120).strength(0.3))
    .alphaDecay(0.02)
    .on('tick', () => {
      // Keep x fixed
      nodes.forEach(n => { n.x = startX + n.layer * layerWidth; });

      gEdges.selectAll('line')
        .attr('x1', d => d.source.x)
        .attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x)
        .attr('y2', d => d.target.y);

      gNodes.selectAll('circle.node-bg')
        .attr('cx', d => d.x)
        .attr('cy', d => d.y);

      gNodes.selectAll('path')
        .attr('d', function(d) {
          if (d.id === 'jarvis') return '';
          const r = 18 + d.progress * 0.18 + 5;
          const pct = d.progress / 100;
          const angle = -Math.PI / 2 + pct * 2 * Math.PI;
          const x = d.x, y = d.y;
          const x1 = x + r * Math.cos(-Math.PI / 2);
          const y1 = y + r * Math.sin(-Math.PI / 2);
          const x2 = x + r * Math.cos(angle);
          const y2 = y + r * Math.sin(angle);
          const largeArc = pct > 0.5 ? 1 : 0;
          return `M ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2}`;
        });

      gNodes.selectAll('text').attr('x', d => d.x).attr('y', d => d.y);

      gLabels.selectAll('text.node-label')
        .attr('x', d => d.x)
        .attr('y', d => d.y + (d.id === 'jarvis' ? 52 : 18 + d.progress * 0.18 + 18));

      gLabels.selectAll('text.node-pct')
        .attr('x', d => d.x)
        .attr('y', d => d.y + (d.id === 'jarvis' ? 67 : 18 + d.progress * 0.18 + 31));
    });

  // Reset button
  document.getElementById('btn-reset').addEventListener('click', () => {
    simulation.alpha(0.3).restart();
  });

  // Resize handler
  window.addEventListener('resize', () => {
    const w = svg.node().clientWidth;
    const h = svg.node().clientHeight;
    const lw = (w - 160) / 5;
    nodes.forEach(n => { n.x = startX + n.layer * lw; });
    simulation.force('y', d3.forceY(h / 2).strength(0.08));
    simulation.alpha(0.3).restart();
    svg.selectAll('.layer-line')
      .attr('y2', h - 40)
      .attr('x1', (d) => startX + d * lw)
      .attr('x2', (d) => startX + d * lw);
    svg.selectAll('.layer-label')
      .attr('x', (d, i) => startX + i * lw);
  });
}

// ── Tooltip ──
function showTooltip(event, d) {
  const tooltip = document.getElementById('tooltip');
  tooltip.innerHTML = `
    <div class="tt-name">${d.name}</div>
    <div class="tt-track">${TRACK_NAMES[d.track] || 'Цель'}</div>
    <div class="tt-pct">Готовность: ${d.id === 'jarvis' ? '—' : d.progress + '%'}</div>
  `;
  tooltip.style.opacity = 1;
  tooltip.style.left = (event.clientX + 16) + 'px';
  tooltip.style.top = (event.clientY - 50) + 'px';

  // Highlight connected edges
  gEdges.selectAll('.edge-line').each(function(ed) {
    const isConnected = ed.source.id === d.id || ed.target.id === d.id;
    d3.select(this).classed('highlighted', isConnected);
    d3.select(this).classed('dimmed', !isConnected);
  });
  d3.select('#node-' + d.id).classed('highlighted', true);
}

function hideTooltip() {
  document.getElementById('tooltip').style.opacity = 0;
  gEdges.selectAll('.edge-line').classed('highlighted', false).classed('dimmed', false);
  gNodes.selectAll('.node-group').classed('highlighted', false);
}

// ── Side Panel ──
function openPanel(d) {
  document.getElementById('panel-overlay').classList.add('open');
  document.getElementById('panel').classList.add('open');
  document.getElementById('panel-title').textContent = d.name;

  // Track badge
  const badge = TRACK_NAMES[d.track] || 'Цель';
  const badgeColor = TRACK_HEX[d.track] || TRACK_HEX.goal;
  const titleArea = document.getElementById('panel-title').parentElement;
  let badgeEl = titleArea.querySelector('.track-badge');
  if (!badgeEl) {
    badgeEl = document.createElement('div');
    badgeEl.className = 'track-badge';
    titleArea.appendChild(badgeEl);
  }
  badgeEl.textContent = badge;
  badgeEl.style.background = badgeColor + '20';
  badgeEl.style.color = badgeColor;
  badgeEl.style.border = '1px solid ' + badgeColor + '40';

  // Progress
  document.getElementById('panel-pct').textContent =
    d.id === 'jarvis' ? 'Цель' : d.progress + '%';
  const miniFill = document.getElementById('panel-mini-fill');
  miniFill.style.width = d.id === 'jarvis' ? '0%' : d.progress + '%';
  miniFill.style.background = badgeColor;

  // Description
  document.getElementById('panel-desc').textContent = d.description;

  // News
  const newsList = document.getElementById('panel-news-list');
  if (d.news && d.news.length > 0) {
    newsList.innerHTML = d.news.map(n => `
      <div class="news-item" onclick="window.open('${n.url}','_blank')" title="${n.url}">
        <div class="news-date">${n.date} · ${n.source}</div>
        <div class="news-title">${n.title}</div>
        <div class="news-source">${n.url}</div>
      </div>
    `).join('');
  } else {
    newsList.innerHTML = '<div class="news-empty">Новостей пока нет — этот этап ещё впереди</div>';
  }

  document.getElementById('panel').scrollTop = 0;
}

function closePanel() {
  document.getElementById('panel-overlay').classList.remove('open');
  document.getElementById('panel').classList.remove('open');
}

// ── Keyboard ──
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closePanel();
});

// ── Start ──
init();
</script>
