<html lang="ru">

<title>Jarvis Index — Прогресс к персональному ИИ-помощнику</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0A0E17; --surface:#111827; --surface2:#1A2236; --border:#1E293B;
  --text:#E2E8F0; --text2:#94A3B8; --text3:#64748B;
  --gold:#FBBF24; --green:#10B981; --red:#EF4444;
  --c-A:#3B82F6;--c-B:#4A9EFF;--c-C:#8B5CF6;--c-D:#10B981;--c-E:#F59E0B;--c-F:#EF4444;--c-G:#EC4899;--c-H:#FBBF24;
}
body{background:var(--bg);color:var(--text);font-family:'Inter','Segoe UI',system-ui,sans-serif;min-height:100dvh}
header{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:16px 24px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;
  position:sticky;top:0;z-index:10;
}
.logo{font-size:18px;font-weight:700;white-space:nowrap}
.logo span{color:var(--gold)}
.jri-box{display:flex;align-items:baseline;gap:8px}
.jri-value{font-size:28px;font-weight:800;line-height:1}
.jri-label{font-size:11px;color:var(--text3)}
.jri-delta{font-size:11px;padding:2px 6px;border-radius:4px;font-weight:600}
.jri-delta.up{background:#064E3B;color:#6EE7B7}
.jri-delta.down{background:#7F1D1D;color:#FCA5A5}
.route-btns{display:flex;gap:4px;margin-left:auto;flex-wrap:wrap}
.route-btns button{
  background:var(--surface2);border:1px solid var(--border);color:var(--text2);
  padding:5px 12px;border-radius:6px;font-size:11px;cursor:pointer;transition:all .2s
}
.route-btns button:hover{background:#243049;color:var(--text)}
.route-btns button.active{background:#1E3A5F;border-color:var(--c-B);color:#60A5FA}
.level-badge{
  padding:4px 12px;border-radius:10px;font-size:12px;font-weight:700;
  background:var(--surface2);border:1px solid var(--border)
}
.hero{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:14px 24px;text-align:center;
}
.hero p{font-size:14px;color:var(--text2);max-width:800px;margin:0 auto;line-height:1.6}
main{padding:20px 24px 50px;max-width:1100px;margin:0 auto}
/* JRI Dashboard Row */
.dash-row{display:grid;grid-template-columns:1fr 1fr 2fr;gap:12px;margin-bottom:24px}
.dash-card{
  background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;
  position:relative;
}
.dash-card.clickable{cursor:pointer;transition:border-color .2s}
.dash-card.clickable:hover{border-color:#334155}
.dash-card-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.dash-card-value{font-size:24px;font-weight:700}
.dash-card-sub{font-size:11px;color:var(--text2);margin-top:2px}
.dash-card-arrow{position:absolute;top:16px;right:16px;font-size:12px;color:var(--text3);transition:transform .2s}
.dash-card.open .dash-card-arrow{transform:rotate(180deg)}
/* Tracks grid */
.tracks-grid{display:flex;flex-direction:column;gap:16px}
.track-block{
  background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;
  opacity:1;transition:opacity .3s
}
.track-block.filtered{opacity:.2}
.track-header{
  display:flex;align-items:center;gap:12px;padding:14px 16px;
  border-bottom:1px solid var(--border);cursor:pointer;
}
.track-header:hover{background:rgba(255,255,255,0.02)}
.track-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.track-id{font-size:11px;color:var(--text3);font-weight:700;min-width:18px}
.track-name{font-size:15px;font-weight:600;flex:1}
.track-score{font-size:22px;font-weight:700;margin-right:8px}
.track-stage{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:4px}
.track-stages-dots{display:flex;gap:3px}
.track-stages-dots span{width:6px;height:6px;border-radius:50%}
.track-stages-dots span.filled{background:currentColor}
.track-stages-dots span.empty{background:var(--border)}
.track-expand{font-size:14px;color:var(--text3);transition:transform .2s}
.track-block.open .track-expand{transform:rotate(90deg)}
/* Nodes inside track */
.track-nodes{display:none;padding:8px 16px 16px}
.track-block.open .track-nodes{display:block}
.node-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px;
}
.node-card{
  background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);
  border-radius:8px;padding:12px;cursor:pointer;transition:all .2s;
}
.node-card:hover{border-color:rgba(255,255,255,0.15);background:rgba(255,255,255,0.03)}
.node-card.nok{opacity:.5}
.node-card-name{font-size:12px;font-weight:600;margin-bottom:6px}
.node-card-row{display:flex;align-items:center;gap:8px}
.node-card-bar{flex:1;height:4px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden}
.node-card-bar-fill{height:100%;border-radius:2px}
.node-card-meta{display:flex;justify-content:space-between;margin-top:6px;font-size:10px;color:var(--text3)}
.node-card-stage{font-size:10px;padding:1px 6px;border-radius:3px}
.stage-5{background:#064E3B;color:#6EE7B7}
.stage-4{background:#064E3B;color:#6EE7B7}
.stage-3{background:#78350F;color:#FBBF24}
.stage-2{background:#1E3A5F;color:#60A5FA}
.stage-1{background:#3B0764;color:#A78BFA}
.stage-0{background:#1F2937;color:#6B7280}
/* Modal */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:20;opacity:0;pointer-events:none;transition:opacity .3s}
#modal-overlay.open{opacity:1;pointer-events:auto}
#modal{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.95);
  width:600px;max-width:95vw;max-height:85vh;
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  z-index:21;overflow-y:auto;
  opacity:0;pointer-events:none;transition:all .25s;
}
#modal.open{opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1)}
.modal-header{
  padding:16px 20px 12px;border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;justify-content:space-between;
  position:sticky;top:0;background:var(--surface);z-index:1;
}
.modal-header h2{font-size:17px}
.modal-close{background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer}
.modal-close:hover{color:var(--text)}
.modal-body{padding:16px 20px}
.modal-section{margin-bottom:14px}
.modal-section h4{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.modal-maturity{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.modal-maturity-val{font-size:28px;font-weight:700}
.modal-maturity-stage{font-size:12px;padding:2px 8px;border-radius:4px}
.modal-confidence{font-size:10px;color:var(--text3)}
.modal-criteria-item{display:flex;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:12px}
.modal-criteria-lvl{width:20px;color:var(--text3);font-weight:700;flex-shrink:0}
.modal-criteria-txt{color:var(--text2)}
.modal-criteria-item.current{color:var(--text)}
.modal-criteria-item.current .modal-criteria-txt{color:var(--text);font-weight:600}
.modal-baseline-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;font-size:12px}
.modal-baseline-item{background:var(--surface2);border-radius:6px;padding:8px;text-align:center}
.modal-baseline-stage{font-size:10px;color:var(--text3)}
.modal-baseline-p50{font-weight:700;margin:2px 0}
.modal-baseline-range{font-size:10px;color:var(--text3)}
.news-item{
  padding:10px 12px;background:var(--surface2);border-radius:6px;margin-bottom:6px;
  border:1px solid transparent;cursor:pointer;transition:border-color .2s
}
.news-item:hover{border-color:var(--border)}
.news-item .nd{font-size:10px;color:var(--text3);margin-bottom:3px}
.news-item .nt{font-size:12px;color:var(--text);line-height:1.4}
.news-item .ns{font-size:10px;color:var(--text3);margin-top:3px}
.news-empty{font-size:12px;color:var(--text3);text-align:center;padding:20px 0}
/* Methodology */
#methodology{margin-top:32px}
.meth-toggle{
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:16px 20px;cursor:pointer;display:flex;align-items:center;gap:12px;
  transition:border-color .2s;margin-bottom:0;
}
.meth-toggle:hover{border-color:#334155}
.meth-toggle-icon{font-size:14px;color:var(--text3);transition:transform .2s;width:20px;text-align:center}
.meth-toggle.open .meth-toggle-icon{transform:rotate(90deg)}
.meth-toggle h3{font-size:15px;color:var(--text3);margin:0}
.meth-toggle-sub{font-size:11px;color:var(--text3);margin-left:auto}
.meth-body{display:none}
.meth-body.open{display:block}
.meth-block{background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 0 10px 10px;padding:0 20px 20px}
.meth-block h3{font-size:14px;margin:16px 0 10px;color:var(--text)}
.meth-block h3:first-child{margin-top:0}
.meth-levels{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.meth-level{background:var(--surface2);border-radius:8px;padding:12px 14px;border-left:3px solid var(--gold)}
.meth-level-code{font-size:14px;font-weight:700;margin-bottom:2px}
.meth-level-name{font-size:11px;color:var(--text2)}
.meth-level-desc{font-size:11px;color:var(--text3);margin-top:4px;line-height:1.4}
.meth-tracks{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.meth-track{background:var(--surface2);border-radius:8px;padding:12px 14px}
.meth-track-id{font-size:13px;font-weight:700;margin-bottom:4px}
.meth-track-q{font-size:11px;color:var(--text3);line-height:1.4}
.meth-formula{font-size:12px;color:var(--text2);line-height:1.8;background:var(--surface2);padding:14px;border-radius:8px;font-family:monospace}
footer{
  background:var(--surface);border-top:1px solid var(--border);
  padding:10px 24px;font-size:10px;color:var(--text3);
  display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px
}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
@media(max-width:768px){
  header{padding:10px 14px;gap:8px}
  .logo{font-size:15px}
  .jri-value{font-size:22px}
  .route-btns{gap:2px}
  .route-btns button{padding:4px 8px;font-size:10px}
  main{padding:12px 8px 30px}
  .dash-row{grid-template-columns:1fr}
  .node-grid{grid-template-columns:1fr}
  #modal{width:100vw;max-height:90vh;border-radius:12px 12px 0 0;top:auto;bottom:0;transform:translate(-50%,100%)}
  #modal.open{transform:translate(-50%,0)}
}
</style>
</head>

<header>
  <div class="logo">JARVIS <span>INDEX</span></div>
  <div class="jri-box">

</header>

<main>
  <div class="dash-row" id="dash-row"></div>
  <div class="tracks-grid" id="tracks-grid"></div>
  <div id="methodology"></div>
</main>

<footer>

</footer>

<div id="modal-overlay" onclick="closeModal()"></div>
<div id="modal">
  <div class="modal-header">
    <h2 id="modal-title"></h2>
    <button class="modal-close" onclick="closeModal()">&times;</button>
  </div>
  <div class="modal-body" id="modal-body"></div>
</div>

<script>
(function(){
  var data, routeId='digital', openTrack=null;
  var TRACK_COLORS = {A:'#3B82F6',B:'#4A9EFF',C:'#8B5CF6',D:'#10B981',E:'#F59E0B',F:'#EF4444',G:'#EC4899',H:'#FBBF24'};
  var STAGE_NAMES = {0:'Absent',1:'Research',2:'Demonstration',3:'Pilot',4:'Production',5:'Infrastructure'};
  var STAGE_CLASS = {0:'stage-0',1:'stage-1',2:'stage-2',3:'stage-3',4:'stage-4',5:'stage-5'};
  var CONF_SCORE = {Low:0.3,Medium:0.6,High:0.9};

  function loadData(cb){
    var el=document.getElementById('embedded-data');
    if(el&&el.textContent.trim()){data=JSON.parse(el.textContent);if(cb)cb();return}
    fetch('data.json').then(function(r){return r.json()}).then(function(d){data=d;if(cb)cb()}).catch(function(){
      document.getElementById('tracks-grid').innerHTML='<p style="color:var(--text2);text-align:center;padding:40px">Нет данных. Запустите: python -m http.server 8080</p>';
    });
  }

  function trackScore(trackId){
    var nodes=data.nodes.filter(function(n){return n.track===trackId});
    if(!nodes.length)return 0;
    var s=0;for(var i=0;i<nodes.length;i++)s+=nodes[i].maturity/5;
    return Math.round(100*s/nodes.length);
  }

  function calcJRI(route){
    var scores={};var tw=route.weights;var logSum=0,wSum=0;
    Object.keys(tw).forEach(function(t){
      var s=trackScore(t)/100||0.01;
      scores[t]=s;var w=tw[t];
      logSum+=w*Math.log(s);wSum+=w;
    });
    var jri=Math.round(100*Math.exp(logSum/wSum));
    var prevJRI=Math.max(1,jri-Math.round(Math.random()*3+2));
    return {value:jri,delta:jri-prevJRI,scores:scores};
  }

  function currentLevel(jri,route){
    var gates=data.gates;var level='J0';
    ['J2','J3','J4','J5','J6'].forEach(function(l){
      var g=gates[l];if(!g)return;var ok=true;
      for(var i=0;i<g.length;i++){var n=data.nodes.find(function(x){return x.id===g[i].node});if(!n||n.maturity<g[i].minMaturity){ok=false;break}}
      if(ok)level=l;
    });
    return level;
  }

  function nextLevelGates(current){
    var order=['J0','J1','J2','J3','J4','J5','J6'];var idx=order.indexOf(current);
    if(idx>=order.length-1)return[];
    return data.gates[order[idx+1]]||[];
  }

  function render(){
    if(!data)return;
    var route=data.routes.find(function(r){return r.id===routeId})||data.routes[0];
    var jri=calcJRI(route);
    var level=currentLevel(jri.value,route);
    var nextGates=nextLevelGates(level);

    // Header
    document.getElementById('jri-value').textContent=jri.value;
    document.getElementById('level-badge').textContent=level;
    document.getElementById('footer-updated').textContent='Обновлено: '+(data.meta.lastUpdated||'—');

    // Dashboard cards
    var p50=2026+Math.round((6*(1-jri.value/100)));
    var levelOrder=['J0','J1','J2','J3','J4','J5','J6'];
    var levelIdx=levelOrder.indexOf(level);
    var nextLevel=levelIdx<levelOrder.length-1?levelOrder[levelIdx+1]:'J6';
    // Build barrier list — show which gates are NOT met
    var barrierNames=[];
    for(var bi=0;bi<nextGates.length;bi++){
      var g=nextGates[bi];var gn=data.nodes.find(function(x){return x.id===g.node});
      if(gn&&gn.maturity<g.minMaturity) barrierNames.push('<span style="color:'+(TRACK_COLORS[gn.track]||'#888')+'">'+g.node+'</span> '+g.label+' (нужно '+g.minMaturity+', сейчас '+gn.maturity+')');
    }
    var barrierHtml=barrierNames.length>0
      ?barrierNames.slice(0,3).join('<br>')+(barrierNames.length>3?'<br>...и ещё '+(barrierNames.length-3):'')
      :'Все барьеры пройдены ✅';
    var dash=document.getElementById('dash-row');
    dash.innerHTML=''+
      '<div class="dash-card clickable" id="level-card">'+
        '<div class="dash-card-arrow">&#9660;</div>'+
        '<div class="dash-card-label">Текущий уровень</div>'+
        '<div class="dash-card-value">'+level+' / J6</div>'+
        '<div class="dash-card-sub">'+data.levels.find(function(l){return l.code===level}).description+'</div>'+
      '</div>'+
      '<div class="dash-card">'+
        '<div class="dash-card-label">Прогноз P50 · '+route.name+'</div>'+
        '<div class="dash-card-value">~'+p50+'</div>'+
        '<div class="dash-card-sub" style="font-size:10px">2026 + 6 × (1 − JRI/100)<br>JRI='+jri.value+' → '+(6*(1-jri.value/100)).toFixed(1)+' лет</div>'+
      '</div>'+
      '<div class="dash-card" style="display:flex;align-items:center">'+
        '<p style="font-size:13px;color:var(--text2);line-height:1.6;margin:0">Jarvis — персональный ИИ, который постоянно понимает контекст человека, помнит его историю и предпочтения, самостоятельно планирует и выполняет цифровые или физические действия, оставаясь управляемым, безопасным и экономически доступным.</p>'+
      '</div>';

    // Level dropdown as modal popup
    var lvlCard=document.getElementById('level-card');
    lvlCard.addEventListener('click',function(e){
      e.stopPropagation();
      var exist=document.getElementById('level-popup');
      if(exist){exist.remove();return;}
      var popup=document.createElement('div');
      popup.id='level-popup';
      popup.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;z-index:25;min-width:360px;max-width:95vw;max-height:75vh;overflow-y:auto;box-shadow:0 16px 48px rgba(0,0,0,0.6)';
      popup.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h3 style="font-size:15px;color:var(--text);margin:0">Уровни Jarvis J0–J6</h3><button style="background:none;border:none;color:var(--text2);font-size:18px;cursor:pointer" onclick="this.parentElement.parentElement.remove()">&times;</button></div>'+
        data.levels.map(function(l){
          var isCurrent=l.code===level;
          return '<div style="padding:10px 12px;border-radius:8px;margin-bottom:6px;'+(isCurrent?'background:rgba(251,191,36,0.12);border:1px solid var(--gold)':'border:1px solid transparent')+'">'+
            '<div style="display:flex;align-items:center;gap:8px"><b style="font-size:14px;'+(isCurrent?'color:var(--gold)':'color:var(--text)')+'">'+l.code+'</b>'+
            (isCurrent?'<span style="font-size:10px;background:var(--gold);color:#000;padding:2px 6px;border-radius:4px;font-weight:600">ТЕКУЩИЙ</span>':'')+
            '<span style="font-size:12px;color:var(--text2)">'+l.name+'</span></div>'+
            '<div style="font-size:11px;color:var(--text3);margin-top:4px;line-height:1.4">'+l.description+'</div>'+
          '</div>';
        }).join('');
      document.body.appendChild(popup);
      // Overlay
      var overlay=document.createElement('div');
      overlay.id='level-overlay';
      overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:24';
      overlay.addEventListener('click',function(){popup.remove();overlay.remove();});
      document.body.appendChild(overlay);
    });

    // Tracks
    var tg=document.getElementById('tracks-grid');tg.innerHTML='';
    data.tracks.forEach(function(t){
      var nodes=data.nodes.filter(function(n){return n.track===t.id});
      var ts=trackScore(t.id);
      var color=TRACK_COLORS[t.id]||'#888';
      var avgM=Math.round(nodes.reduce(function(s,n){return s+n.maturity},0)/nodes.length*10)/10;
      var isOpen=openTrack===t.id;

      var block=document.createElement('div');
      block.className='track-block'+(isOpen?' open':'');
      block.style.borderLeft='3px solid '+color;
      block.innerHTML=
        '<div class="track-header" data-track="'+t.id+'">'+
          '<span class="track-dot" style="background:'+color+'"></span>'+
          '<span class="track-id">'+t.id+'</span>'+
          '<span class="track-name">'+t.name+'</span>'+
          '<span class="track-score">'+ts+'</span>'+
          '<span class="track-stage">'+avgM+'/5 <span class="track-stages-dots">'+
            [1,2,3,4,5].map(function(i){return '<span class="'+(i<=Math.round(avgM)?'filled':'empty')+'" style="color:'+color+'"></span>';}).join('')+
          '</span>'+
          '<span class="track-expand">&#9654;</span>'+
        '</div>'+
        '<div class="track-nodes"><div class="node-grid">'+
          nodes.map(function(n){
            var mb=Math.round(n.maturity*10)/10;
            var stage=n.stage||STAGE_NAMES[Math.floor(n.maturity)]||'—';
            var nok=true;
            if(nextGates.length){nok=!nextGates.some(function(g){return g.node===n.id&&n.maturity<g.minMaturity;});}
            return '<div class="node-card'+(nok?'':' nok')+'" data-node="'+n.id+'" style="border-left:2px solid '+color+'">'+
              '<div class="node-card-name">'+n.shortName+'</div>'+
              '<div class="node-card-row">'+
                '<div class="node-card-bar"><div class="node-card-bar-fill" style="width:'+(mb*20)+'%;background:'+color+'"></div></div>'+
                '<span style="font-size:11px;color:var(--text2)">'+mb+'</span>'+
              '</div>'+
              '<div class="node-card-meta">'+
                '<span class="node-card-stage '+STAGE_CLASS[Math.floor(n.maturity)]+'">'+stage+'</span>'+
                '<span>'+(n.news?n.news.length:0)+' нов.</span>'+
              '</div>'+
            '</div>';
          }).join('')+
        '</div></div>';

      block.querySelector('.track-header').addEventListener('click',function(){
        openTrack=(openTrack===t.id)?null:t.id;render();
      });
      block.querySelectorAll('.node-card').forEach(function(card){
        card.addEventListener('click',function(e){e.stopPropagation();openNode(card.dataset.node);});
      });
      tg.appendChild(block);
    });

    // ── Methodology section ──
    var meth=document.getElementById('methodology');
    var methOpen=false;
    meth.innerHTML=
      '<div class="meth-toggle" id="meth-toggle">'+
        '<span class="meth-toggle-icon">&#9654;</span>'+
        '<h3>Методология</h3>'+
        '<span class="meth-toggle-sub">JRI · Уровни J0–J6 · Шкала 0–5</span>'+
      '</div>'+
      '<div class="meth-body" id="meth-body">'+
        '<div class="meth-block">'+
          '<h3>Формула JRI</h3>'+
          '<div class="meth-formula">'+
            '<b>JRI (Jarvis Readiness Index)</b> = 100 × ∏(TrackScore<sub>k</sub> / 100)<sup>w<sub>k</sub></sup><br><br>'+
            '<b>TrackScore</b> = 100 × среднее(maturity<sub>i</sub> / 5) по всем подэтапам трека<br><br>'+
            'JRI использует взвешенное геометрическое среднее, чтобы сильный прогресс одного трека не компенсировал критическое отставание другого.'+
          '</div>'+
        '</div>'+
        '<div class="meth-block">'+
          '<h3>Уровни зрелости Jarvis (J0–J6)</h3>'+
          '<div class="meth-levels">'+
            data.levels.map(function(l){return '<div class="meth-level"><div class="meth-level-code">'+l.code+'</div><div class="meth-level-name">'+l.name+'</div><div class="meth-level-desc">'+l.description+'</div></div>';}).join('')+
          '</div>'+
        '</div>'+
        '<div class="meth-block">'+
          '<h3>Шкала зрелости 0–5</h3>'+
          '<div class="meth-levels">'+
            ['0 — Absent: Работающего подхода нет, нет проверяемого доказательства',
             '1 — Research: Есть теория, ранний эксперимент или разовая демонстрация',
             '2 — Demonstration: Повторяемая лабораторная демонстрация в контролируемой среде',
             '3 — Pilot: Работает в ограниченных реальных сценариях с участием человека',
             '4 — Production: Надёжно работает в массовом продукте для типовых задач',
             '5 — Infrastructure: Стало дешёвым, стандартным, масштабируемым и повсеместным'].map(function(s,i){
              return '<div class="meth-level" style="border-left-color:'+['#6B7280','#A78BFA','#60A5FA','#FBBF24','#6EE7B7','#34D399'][i]+'"><div class="meth-level-code">'+s+'</div></div>';
            }).join('')+
          '</div>'+
        '</div>'+
      '</div>';
    document.getElementById('meth-toggle').addEventListener('click',function(){
      methOpen=!methOpen;
      this.classList.toggle('open',methOpen);
      document.getElementById('meth-body').classList.toggle('open',methOpen);
    });
  }

  function openNode(nodeId){
    var n=data.nodes.find(function(x){return x.id===nodeId});if(!n)return;
    var color=TRACK_COLORS[n.track]||'#888';
    var mb=Math.round(n.maturity*10)/10;
    var stage=n.stage||STAGE_NAMES[Math.floor(n.maturity)]||'—';
    var conf=n.confidence||'Medium';
    var track=data.tracks.find(function(t){return t.id===n.track});

    var criteriaHtml='';
    if(n.criteria_0_5){
      for(var lvl=0;lvl<=5;lvl++){
        var cls=(lvl===Math.floor(n.maturity))?' current':'';
        criteriaHtml+='<div class="modal-criteria-item'+cls+'"><span class="modal-criteria-lvl">'+lvl+'</span><span class="modal-criteria-txt">'+n.criteria_0_5[lvl]+'</span></div>';
      }
    }

    var baselineHtml='';
    if(n.baseline){
      baselineHtml='<div class="modal-baseline-grid">';
      ['stage3','stage4','stage5'].forEach(function(sk){
        var b=n.baseline[sk];
        baselineHtml+='<div class="modal-baseline-item"><div class="modal-baseline-stage">Стадия '+(sk==='stage3'?3:sk==='stage4'?4:5)+'</div><div class="modal-baseline-p50">'+b.p50+'</div><div class="modal-baseline-range">'+b.p25+' – '+b.p75+'</div></div>';
      });
      baselineHtml+='</div>';
    }

    var newsHtml='';
    if(n.news&&n.news.length>0){
      newsHtml=n.news.map(function(nw){
        var dir=nw.direction==='positive'?'+':nw.direction==='negative'?'−':'';
        return '<div class="news-item" onclick="window.open(\''+nw.url+'\',\'_blank\')">'+
          '<div class="nd">'+nw.date+' · '+nw.source+(nw.signal_score?' · Score '+nw.signal_score:'')+'</div>'+
          '<div class="nt">'+dir+' '+nw.title+'</div>'+
          '<div class="ns">'+nw.url+'</div></div>';
      }).join('');
    }else{newsHtml='<div class="news-empty">Новостей пока нет</div>';}

    var gatesHtml='';
    Object.keys(data.gates).forEach(function(gl){
      var g=data.gates[gl];
      var matched=g.find(function(x){return x.node===n.id});
      if(matched){
        gatesHtml+='<div style="font-size:11px;padding:4px 8px;background:var(--surface2);border-radius:4px;margin-bottom:4px">'+
          '<b>Gate '+gl+':</b> maturity ≥ '+matched.minMaturity+' — '+matched.label+
          (n.maturity>=matched.minMaturity?' ✅':' ❌')+'</div>';
      }
    });

    document.getElementById('modal-title').textContent=n.id+' '+n.name;
    document.getElementById('modal-body').innerHTML=
      '<div class="modal-section"><h4>Зрелость</h4>'+
        '<div class="modal-maturity"><span class="modal-maturity-val">'+mb+'</span><span class="modal-maturity-stage '+STAGE_CLASS[Math.floor(n.maturity)]+'">'+stage+'</span></div>'+
        '<div class="modal-confidence">Confidence: '+conf+' · Трек: '+(track?track.name:n.track)+'</div>'+
      '</div>'+
      '<div class="modal-section"><p style="font-size:13px;color:var(--text2);line-height:1.6">'+n.description+'</p></div>'+
      '<div class="modal-section"><h4>Критерии стадий 0–5</h4>'+criteriaHtml+'</div>'+
      (baselineHtml?'<div class="modal-section"><h4>Прогноз достижения стадий (P25/P50/P75)</h4>'+baselineHtml+'</div>':'')+
      (gatesHtml?'<div class="modal-section"><h4>Hard Gates</h4>'+gatesHtml+'</div>':'')+
      '<div class="modal-section"><h4>Зависимости</h4><p style="font-size:12px;color:var(--text2)">'+(n.dependencies&&n.dependencies.length?n.dependencies.map(function(d){return '<code style="background:var(--surface2);padding:1px 4px;border-radius:3px">'+d+'</code>';}).join(' '):'Нет зависимостей')+'</p></div>'+
      '<div class="modal-section"><h4>Новости ('+(n.news?n.news.length:0)+')</h4>'+newsHtml+'</div>';

    document.getElementById('modal-overlay').classList.add('open');
    document.getElementById('modal').classList.add('open');
    document.getElementById('modal').scrollTop=0;
  }

  window.closeModal=function(){
    document.getElementById('modal-overlay').classList.remove('open');
    document.getElementById('modal').classList.remove('open');
  };
  document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});

  // Hash routing
  function handleHash(){
    var h=location.hash.replace('#','');
    if(h.startsWith('node-')){var nid=h.replace('node-','');loadData(function(){openNode(nid);});}
    else{loadData(function(){render();});}
  }
  window.addEventListener('hashchange',handleHash);
  handleHash();
})();
</script>
</body>
</html>
